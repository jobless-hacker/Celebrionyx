<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Intelligence Dashboard | Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page" data-page="login">
  <main class="auth-shell login-container">
    <header class="brand-header login-brand">
      <div class="brand-row">
        <svg class="shield-icon login-logo" viewBox="0 0 64 64" aria-hidden="true">
          <defs>
            <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#d9ecff"/>
              <stop offset="100%" stop-color="#5aa2ff"/>
            </linearGradient>
          </defs>
          <path d="M32 4L54 12v18c0 14-8 25-22 30C18 55 10 44 10 30V12L32 4z" fill="none" stroke="url(#shieldGradient)" stroke-width="3"/>
          <path d="M32 12v40M20 24h8M36 32h8M24 40h10" stroke="#9fd2ff" stroke-width="3" stroke-linecap="round"/>
          <circle cx="28" cy="24" r="2.4" fill="#dff2ff"/>
          <circle cx="42" cy="32" r="2.4" fill="#dff2ff"/>
        </svg>
        <div class="brand-copy">
          <h1 class="login-title">INTELLIGENCE</h1>
          <p class="login-tagline">DASHBOARD</p>
        </div>
      </div>
    </header>

    <div class="shell-subhead">
      <p>Real-Time Threat Monitoring &amp; Alerts</p>
    </div>

    <section class="form-panel login-card">
      <h2>Sign In</h2>

      <form id="loginForm" class="login-form" novalidate>
        <div class="field form-group">
          <label for="email">Email</label>
          <div class="input-wrap input-field" id="emailWrap">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M3 6h18v12H3z" fill="none" stroke="currentColor" stroke-width="1.8"/>
                <path d="M4 7l8 7 8-7" fill="none" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </span>
            <input id="email" class="input-field-control" name="email" type="email" autocomplete="email" placeholder="Enter your email" required>
          </div>
        </div>

        <div class="field form-group">
          <label for="password">Password</label>
          <div class="input-wrap input-field" id="passwordWrap">
            <span class="field-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M6 11h12v9H6z" fill="none" stroke="currentColor" stroke-width="1.8"/>
                <path d="M8.5 11V8.7A3.5 3.5 0 0112 5.2a3.5 3.5 0 013.5 3.5V11" fill="none" stroke="currentColor" stroke-width="1.8"/>
              </svg>
            </span>
            <input id="password" class="input-field-control" name="password" type="password" autocomplete="current-password" placeholder="Enter your password" required>
            <button id="togglePassword" type="button" class="icon-button password-toggle" aria-label="Show password">
              <svg viewBox="0 0 24 24">
                <path d="M2 12s3.8-6 10-6 10 6 10 6-3.8 6-10 6-10-6-10-6z" fill="none" stroke="currentColor" stroke-width="1.8"/>
                <circle cx="12" cy="12" r="2.8" fill="currentColor"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-options login-options">
          <label class="remember remember-me">
            <input id="rememberMe" type="checkbox" name="rememberMe">
            <span>Remember me</span>
          </label>
          <a href="#" id="forgotPassword" class="forgot-password">Forgot Password?</a>
        </div>

        <p id="formMessage" class="form-message" role="status" aria-live="polite"></p>

        <button type="submit" id="submitBtn" class="primary-btn btn btn-primary btn-block login-submit">Sign In</button>
      </form>

      <p class="support login-support">
        Need help?
        <a href="mailto:support@intelligence.local">Contact support</a>.
      </p>
      <p class="hint">
        Demo login: <strong>analyst@intelligence.local</strong> / <strong>ThreatWatch@2026</strong>
      </p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
